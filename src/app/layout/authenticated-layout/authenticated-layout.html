<div class="min-h-screen bg-stone-50">
  <app-floating-nav></app-floating-nav>
  <div class="flex min-h-screen flex-col pt-30 max-[980px]:pt-36 max-[640px]:pt-30">
    <main class="flex-1">
      <router-outlet></router-outlet>
    </main>

    <footer class="px-6 pb-8 pt-10 max-[640px]:px-4 max-[640px]:pb-6 max-[640px]:pt-8">
      <div
        class="mx-auto flex max-w-6xl flex-col gap-6 rounded-[2rem] border border-white/80 bg-white/85 px-6 py-6 shadow-[0_1.125rem_45px_rgba(148,163,184,0.14)] backdrop-blur md:flex-row md:items-end md:justify-between md:px-8 max-[640px]:rounded-[1.5rem] max-[640px]:gap-5 max-[640px]:px-4 max-[640px]:py-4"
      >
        <div class="max-w-2xl">
          <div class="flex items-center gap-3">
            <span
              class="inline-flex h-11 w-11 items-center justify-center rounded-full bg-[linear-gradient(135deg,#f59e0b_0%,#fb7185_100%)] text-[#fff8ef] shadow-[inset_0_1px_0_rgba(255,255,255,0.4)] max-[640px]:h-10 max-[640px]:w-10"
            >
              <app-icon name="chef-hat" [size]="20"></app-icon>
            </span>
            <div>
              <p class="text-[0.78rem] font-extrabold tracking-[0.16em] text-orange-600 uppercase">
                Recetario App
              </p>
              <h2 class="text-[1.35rem] font-semibold text-[#18243f] max-[640px]:text-[1.15rem]">
                Tu cocina organizada, simple y siempre a mano
              </h2>
            </div>
          </div>

          <p class="mt-3 text-sm leading-6 text-slate-500 max-[640px]:mt-2 max-[640px]:text-[0.92rem] max-[640px]:leading-5">
            Guarda tus recetas, vuelve a tus favoritas y sigue cocinando sin perder el hilo.
          </p>
        </div>

        <div class="flex flex-col gap-4 md:items-end">
          <div class="flex flex-wrap gap-2.5">
            <a
              routerLink="/app/home"
              class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:border-orange-200 hover:bg-orange-50 hover:text-orange-700"
            >
              <app-icon name="house" [size]="16"></app-icon>
              <span>Inicio</span>
            </a>
            <a
              routerLink="/app/recipes"
              class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:border-orange-200 hover:bg-orange-50 hover:text-orange-700"
            >
              <app-icon name="book-open" [size]="16"></app-icon>
              <span>Recetas</span>
            </a>
            <a
              routerLink="/app/recipes/new"
              class="inline-flex items-center gap-2 rounded-full bg-orange-500 px-4 py-2.5 text-sm font-semibold text-white shadow-[0_12px_24px_rgba(249,115,22,0.22)] transition hover:bg-orange-600"
            >
              <app-icon name="plus" [size]="16"></app-icon>
              <span>Nueva receta</span>
            </a>
          </div>

          <p class="text-sm text-slate-400 max-[640px]:text-[0.82rem]">
            © {{ currentYear }} Recetario App
          </p>
        </div>
      </div>
    </footer>
  </div>
</div>
