<div class="image-frame" [class.image-frame--rounded]="rounded()">
  <div
    class="image-placeholder"
    [class.image-placeholder--hidden]="isLoaded() || hasTerminalError()"
  >
    <div class="image-shimmer"></div>
  </div>

  @if (!hasTerminalError()) {
    <picture class="image-picture">
      @if (!hasError() && usesGeneratedSources()) {
        <source [srcset]="avifSrc()" [attr.sizes]="resolvedSizes()" type="image/avif" />
        <source [srcset]="webpSrc()" [attr.sizes]="resolvedSizes()" type="image/webp" />
      }

      <img
        [src]="imgSrc()"
        [attr.srcset]="imgSrcSet()"
        [attr.sizes]="resolvedSizes()"
        [attr.width]="image().width"
        [attr.height]="image().height"
        [alt]="resolvedAlt()"
        [attr.fetchpriority]="fetchPriority()"
        [loading]="effectiveLoading()"
        [class]="finalClass()"
        [class.image-element--loaded]="isLoaded()"
        (load)="onLoad()"
        (error)="onError()"
      />
    </picture>
  }
</div>
