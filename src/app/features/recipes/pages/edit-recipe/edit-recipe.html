@if (loading()) {
  <div class="min-h-screen">
    <div class="mx-auto max-w-6xl px-6 py-10 max-[640px]:px-4 max-[640px]:py-6">
      <div class="rounded-[2rem] border border-white/80 bg-white p-10 text-center shadow-[0_1.125rem_45px_rgba(148,163,184,0.18)] dark:border-[#5c4438]/70 dark:bg-[#241815]/82 dark:shadow-[0_24px_55px_rgba(9,6,5,0.35)]">
        <p class="text-[18px] text-slate-600 dark:text-[#cfb8a9]">Cargando receta...</p>
      </div>
    </div>
  </div>
} @else if (error()) {
  <div class="min-h-screen">
    <div class="mx-auto max-w-6xl px-6 py-10 max-[640px]:px-4 max-[640px]:py-6">
      <div class="rounded-[2rem] border border-red-200 bg-white p-10 text-center shadow-[0_1.125rem_45px_rgba(148,163,184,0.18)] dark:border-[#7a474b] dark:bg-[#241815]/82 dark:shadow-[0_24px_55px_rgba(9,6,5,0.35)]">
        <p class="text-[18px] text-red-600">{{ error() }}</p>
      </div>
    </div>
  </div>
} @else if (recipe()) {
  <app-recipe-form
    mode="edit"
    [initialRecipe]="recipe()"
    [saving]="saving()"
    [submitError]="submitError()"
    (submitted)="saveRecipe($event)"
    (cancelled)="cancel()"
  />
}
